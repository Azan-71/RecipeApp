{% extends "base.html" %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
  <div class="card shadow-lg">
    <div class="card-body">
      <h2 class="card-title mb-3">Add Comment for {{ recipe.title }}</h2>
      <form method="post" class="mb-3">
        {% csrf_token %}
        <div class="mb-3">
          <textarea name="text" rows="4" class="form-control" placeholder="Write your comment..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Post Comment</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
