{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card shadow-lg p-4 rounded-4" style="max-width: 480px; width:100%;" data-aos="zoom-in">
    <h2 class="fw-bold mb-3 text-center">🔒 Choose a New Password</h2>
    <form method="post" data-aos="fade-up">
      {% csrf_token %}
      <div class="mb-3">
        {{ form.new_password1.label_tag }}
        {{ form.new_password1 }}
      </div>
      <div class="mb-3">
        {{ form.new_password2.label_tag }}
        {{ form.new_password2 }}
      </div>
      <button type="submit" class="btn btn-success w-100 fw-bold">Reset Password</button>
    </form>
    <div class="mt-3 text-center" data-aos="fade-in">
      <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
