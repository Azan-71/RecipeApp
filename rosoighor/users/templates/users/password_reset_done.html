{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card shadow-lg p-4 rounded-4 text-center" style="max-width: 420px; width:100%;" data-aos="zoom-in">
    <h2 class="fw-bold mb-3">📧 Check Your Email</h2>
    <p class="mb-4 text-muted">
      If an account exists with the email you entered, you’ll receive a password reset link shortly.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary w-100 fw-bold" data-aos="fade-up">
      🔑 Back to Login
    </a>
  </div>
</div>
{% endblock %}
