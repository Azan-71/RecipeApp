{% extends "base.html" %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
  <div class="card shadow-lg">
    <div class="card-body">
      <h1 class="card-title mb-3">Recipe Nutrition Facts</h1>
      <div class="table-responsive">
        <table class="table table-striped table-hover" id="nutritionTable">
          <thead class="table-dark">
            <tr>
              <th>Recipe</th>
              <th>Calories</th>
              <th>Protein (g)</th>
              <th>Fat (g)</th>
              <th>Carbs (g)</th>
            </tr>
          </thead>
          <tbody>
            {% for n in nutritions %}
            <tr data-aos="fade-up" data-aos-delay="{{ forloop.counter0|add:100 }}">
              <td>{{ n.recipe.title }}</td>
              <td>{{ n.calories }}</td>
              <td>{{ n.protein }}</td>
              <td>{{ n.fat }}</td>
              <td>{{ n.carbs }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="5" class="text-center">No nutrition data available.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Theme Toggle Script -->
{% endblock %}
