<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RosoiGhor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    /* Smooth fade for whole page */
    body {
      opacity: 0;
      transition: background-color 0.6s ease, color 0.6s ease, opacity 0.6s ease;
    }
    body.fade-in {
      opacity: 1;
    }

    /* Slide-up animation for main content */
    main {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    main.slide-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* Staggered card animation */
    .card {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .card.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Hover lift effect */
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    table, .navbar, footer {
      transition: background-color 0.6s ease, color 0.6s ease;
    }
  </style>
</head>
<body class="bg-light text-dark">

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark" id="mainNavbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">RosoiGhor</a>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/recipes/add_recipe/">Add Recipe</a></li>
        <li class="nav-item"><a class="nav-link" href="/logout/">Logout</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main Navigation -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom" id="secondaryNavbar">
    <div class="container">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/recipes/">Recipes</a></li>
        <li class="nav-item"><a class="nav-link" href="/stories/">Stories</a></li>
        <li class="nav-item"><a class="nav-link" href="/shopping/">Shopping Tips</a></li>
        <li class="nav-item"><a class="nav-link" href="/market/">Market Prices</a></li>
        <li class="nav-item"><a class="nav-link" href="/nutrition/">Nutrition</a></li>
        <li class="nav-item"><a class="nav-link" href="/comments/">Feedback</a></li>
      </ul>
      <!-- Theme Toggle -->
      <button class="btn btn-outline-dark" id="themeToggle">🌙 Dark</button>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="container mt-4">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5" id="mainFooter">
    <p>© 2026 RosoiGhor</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    const toggleBtn = document.getElementById('themeToggle');
    const mainContent = document.querySelector("main");

    document.addEventListener("DOMContentLoaded", () => {
      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "dark") {
        enableDarkMode(false);
      } else {
        disableDarkMode(false);
      }
      // Fade-in + slide-in after theme applied
      setTimeout(() => {
        document.body.classList.add("fade-in");
        mainContent.classList.add("slide-in");

        // stagger cards
        const cards = document.querySelectorAll(".card");
        cards.forEach((card, i) => {
          setTimeout(() => card.classList.add("show"), i * 150);
        });
      }, 50);
    });

    toggleBtn.addEventListener("click", () => {
      if (document.body.classList.contains("bg-dark")) {
        disableDarkMode(true);
        localStorage.setItem("theme", "light");
      } else {
        enableDarkMode(true);
        localStorage.setItem("theme", "dark");
      }
    });

    function enableDarkMode(withFade = true) {
      if (withFade) document.body.style.opacity = "0";
      setTimeout(() => {
        document.body.classList.add("bg-dark", "text-white");
        document.body.classList.remove("bg-light", "text-dark");

        document.querySelectorAll("table").forEach(table => table.classList.add("table-dark"));
        document.querySelectorAll(".card").forEach(card => {
          card.classList.add("bg-dark", "text-white");
          card.classList.remove("bg-light", "text-dark");
        });
        document.querySelectorAll(".navbar").forEach(nav => {
          nav.classList.add("navbar-dark", "bg-dark");
          nav.classList.remove("navbar-light", "bg-light");
        });
        const footer = document.getElementById("mainFooter");
        footer.classList.add("bg-dark", "text-white");
        footer.classList.remove("bg-light", "text-dark");

        toggleBtn.textContent = "☀️ Light";
        toggleBtn.classList.remove("btn-outline-dark");
        toggleBtn.classList.add("btn-outline-light");

        if (withFade) document.body.style.opacity = "1";
      }, withFade ? 200 : 0);
    }

    function disableDarkMode(withFade = true) {
      if (withFade) document.body.style.opacity = "0";
      setTimeout(() => {
        document.body.classList.add("bg-light", "text-dark");
        document.body.classList.remove("bg-dark", "text-white");

        document.querySelectorAll("table").forEach(table => table.classList.remove("table-dark"));
        document.querySelectorAll(".card").forEach(card => {
          card.classList.add("bg-light", "text-dark");
          card.classList.remove("bg-dark", "text-white");
        });
        document.querySelectorAll(".navbar").forEach(nav => {
          nav.classList.add("navbar-light", "bg-light");
          nav.classList.remove("navbar-dark", "bg-dark");
        });
        const footer = document.getElementById("mainFooter");
        footer.classList.add("bg-light", "text-dark");
        footer.classList.remove("bg-dark", "text-white");

        toggleBtn.textContent = "🌙 Dark";
        toggleBtn.classList.remove("btn-outline-light");
        toggleBtn.classList.add("btn-outline-dark");

        if (withFade) document.body.style.opacity = "1";
      }, withFade ? 200 : 0);
    }
  </script>
</body>
</html>
