
{% extends "base.html" %}

{% block content %}
<div class="container mt-5" data-aos="fade-up">
  <div class="card shadow-lg">
    <div class="card-body">
      <h2 class="card-title mb-3">Latest Market Prices</h2>
      <div class="table-responsive">
        <table class="table table-striped table-hover" id="priceTable">
          <thead class="table-dark">
            <tr>
              <th>Item</th>
              <th>Country</th>
              <th>Price</th>
              <th>Currency</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            {% for price in prices %}
              <tr data-aos="fade-up" data-aos-delay="{{ forloop.counter0|add:100 }}">
                <td>{{ price.item_name }}</td>
                <td>{{ price.country }}</td>
                <td>{{ price.price }}</td>
                <td>{{ price.currency }}</td>
                <td>{{ price.date }}</td>
              </tr>
            {% empty %}
              <tr><td colspan="5" class="text-center">No market data available.</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Theme Toggle Script -->
{% endblock %}
