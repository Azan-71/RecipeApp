{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card shadow-lg p-4 rounded-4" style="max-width: 480px; width:100%;" data-aos="zoom-in">
    <h2 class="fw-bold mb-3 text-center">Reset Your Password</h2>
    <p class="text-muted text-center mb-4">
      Enter your email address and we’ll send you instructions to reset your password.
    </p>
    <form method="post" data-aos="fade-up">
      {% csrf_token %}
      <div class="mb-3">
        {{ form.email.label_tag }}
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-bold">📧 Send Reset Link</button>
    </form>
    <div class="mt-3 text-center" data-aos="fade-in">
      <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
