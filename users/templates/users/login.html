{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:70vh;">
  <div class="card shadow-lg p-4 rounded-4" style="max-width: 420px; width:100%;" data-aos="zoom-in">
    <h2 class="mb-4 text-center fw-bold">Welcome Back</h2>

    <!-- Register with Email -->
    <div class="d-grid gap-3 mb-4">
      <a href="{% url 'signup' %}" class="btn btn-info text-white fw-bold" data-aos="fade-up">
        Register with Email
      </a>
    </div>

    <!-- Divider -->
    <hr class="my-4">

    <!-- Login Form -->
    <form method="post" class="mt-3" data-aos="fade-up">
      {% csrf_token %}
      <div class="mb-3">
        {{ form.username.label_tag }}
        {{ form.username }}
      </div>
      <div class="mb-3">
        {{ form.password.label_tag }}
        {{ form.password }}
      </div>
      <button type="submit" class="btn btn-success w-100 fw-bold">Login</button>
    </form>

    <!-- Forgot Password -->
    <div class="mt-3 text-center" data-aos="fade-in">
      <a href="{% url 'password_reset' %}" class="text-decoration-none">Forgot your password?</a>
    </div>
  </div>
</div>
{% endblock %}
